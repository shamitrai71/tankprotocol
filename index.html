<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abledinos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #f0f4f2;
    font-family: 'Syne', sans-serif;
  }

  /* ── animated radial pulse background ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 70% 60% at 50% 50%, rgba(0,180,140,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 100% 100% at 50% 50%, #f0f4f2 55%, #e8ede9 100%);
    animation: bgPulse 4s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    from { opacity: 0.7; }
    to   { opacity: 1; }
  }

  /* grid lines */
  .grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,140,100,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,140,100,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridFade 1.2s ease forwards;
    opacity: 0;
  }
  @keyframes gridFade { to { opacity: 1; } }

  /* floating orbs */
  .orb {
    position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; pointer-events: none;
  }
  .orb1 { width:500px;height:500px; background:rgba(0,200,100,0.08); top:-120px; left:-120px;
           animation: orbDrift1 9s ease-in-out infinite alternate; }
  .orb2 { width:400px;height:400px; background:rgba(0,160,220,0.06); bottom:-80px; right:-80px;
           animation: orbDrift2 11s ease-in-out infinite alternate; }
  .orb3 { width:280px;height:280px; background:rgba(80,220,120,0.05); top:40%; left:60%;
           animation: orbDrift1 7s ease-in-out infinite alternate; }
  @keyframes orbDrift1 { to { transform: translate(40px, 30px) scale(1.1); } }
  @keyframes orbDrift2 { to { transform: translate(-30px, -40px) scale(1.08); } }

  /* ── main container ── */
  .splash {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  /* ── logo ring ── */
  .logo-ring {
    position: relative;
    width: 180px; height: 180px;
    margin-bottom: 32px;
    animation: logoEntry 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  }
  @keyframes logoEntry {
    from { opacity: 0; transform: scale(0.4) rotate(-15deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* spinning ring */
  .ring-svg {
    position: absolute; inset: -12px;
    width: calc(100% + 24px); height: calc(100% + 24px);
    animation: ringRotate 8s linear infinite;
  }
  @keyframes ringRotate { to { transform: rotate(360deg); } }

  /* glow pulse behind logo */
  .logo-glow {
    position: absolute; inset: -20px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,180,120,0.15) 0%, transparent 70%);
    animation: glowPulse 2.5s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { transform: scale(0.9); opacity: 0.5; }
    50%      { transform: scale(1.15); opacity: 1; }
  }

  .logo-img {
    width: 180px; height: 180px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center 10%;
    border: 3px solid rgba(0,180,120,0.4);
    position: relative; z-index: 2;
    box-shadow: 0 0 30px rgba(0,180,120,0.2), 0 0 60px rgba(0,180,120,0.08);
  }

  /* ── app name ── */
  .app-name {
    font-size: 52px; font-weight: 800;
    letter-spacing: -2px; line-height: 1;
    color: transparent;
    background: linear-gradient(135deg, #009e7e 0%, #2ea55c 40%, #0090ab 100%);
    -webkit-background-clip: text;
    background-clip: text;
    margin-bottom: 10px;
    animation: nameEntry 0.7s ease 0.7s both;
    filter: drop-shadow(0 0 16px rgba(0,160,130,0.2));
  }
  @keyframes nameEntry {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── tagline ── */
  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 400;
    color: #5a8a70;
    letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 56px;
    animation: nameEntry 0.7s ease 0.9s both;
  }

  /* ── loading bar ── */
  .loader-wrap {
    width: 220px;
    animation: nameEntry 0.5s ease 1.1s both;
  }
  .loader-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: #6a9a80; letter-spacing: 2px;
    text-transform: uppercase; text-align: center;
    margin-bottom: 10px;
  }
  .loader-track {
    width: 100%; height: 3px;
    background: rgba(0,180,120,0.15);
    border-radius: 2px; overflow: hidden;
  }
  .loader-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #009e7e, #2ea55c);
    box-shadow: 0 0 8px rgba(0,160,130,0.3);
    width: 0%;
    animation: loadFill 2.2s cubic-bezier(0.4,0,0.2,1) 1.2s forwards;
  }
  @keyframes loadFill {
    0%   { width: 0%; }
    30%  { width: 35%; }
    60%  { width: 68%; }
    85%  { width: 88%; }
    100% { width: 100%; }
  }

  /* dots */
  .dots {
    display: flex; gap: 6px; justify-content: center; margin-top: 16px;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(0,180,120,0.2);
    animation: dotPop 0.4s ease both;
  }
  .dot:nth-child(1) { animation-delay: 1.5s; }
  .dot:nth-child(2) { animation-delay: 1.7s; }
  .dot:nth-child(3) { animation-delay: 1.9s; }
  @keyframes dotPop {
    from { background: rgba(0,180,120,0.12); transform: scale(0.5); }
    to   { background: rgba(0,180,120,0.7); transform: scale(1); box-shadow: 0 0 6px rgba(0,180,120,0.3); }
  }

  /* ── NSE badge ── */
  .nse-badge {
    position: fixed; bottom: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: #7a9a8a;
    letter-spacing: 2px; text-transform: uppercase;
    animation: nameEntry 0.5s ease 1.4s both;
  }
  .nse-badge span { color: #5a8a70; }

  /* ── exit animation ── */
  .splash.exit {
    animation: splashExit 0.6s cubic-bezier(0.4,0,1,1) forwards;
  }
  @keyframes splashExit {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.06); }
  }
</style>
</head>

<script>
  const messages = [
    'Connecting to NSE…',
    'Loading portfolio…',
    'Fetching live prices…',
    'Calculating RSI…',
    'Almost ready…',
  ];
  let mi = 0;
  const label = document.getElementById('loaderLabel');

  const iv = setInterval(() => {
    mi = (mi + 1) % messages.length;
    label.style.opacity = 0;
    setTimeout(() => {
      label.textContent  = messages[mi];
      label.style.transition = 'opacity 0.3s';
      label.style.opacity = 1;
    }, 150);
  }, 520);

  // After ~3.6s → exit animation then redirect
  setTimeout(() => {
    clearInterval(iv);
    label.textContent = 'Ready!';
    document.getElementById('splash').classList.add('exit');
    setTimeout(() => {
      window.location.href = 'abledinos_auth.html';
    }, 650);
  }, 3600);
</script>
